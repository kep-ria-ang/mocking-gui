name: automatically-assign-reviewers

on:
  pull_request_target:
    types: [opened, ready_for_review]

# pull_request_target grants a write-scoped token even for fork PRs; safe here since
# this job never checks out the PR's untrusted head ref.
jobs:
  auto-assign:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.0
        with:
          configuration-path: '.github/auto-mentioned.yml'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
